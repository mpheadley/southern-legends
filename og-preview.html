<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG Preview — Southern Legends Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px;
  }

  .instructions {
    color: #999;
    font-family: system-ui;
    font-size: 14px;
    margin-bottom: 20px;
    text-align: center;
  }

  /* ─── OG Card ─── */
  .og {
    position: relative;
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: linear-gradient(to right, #1a3a2a 0%, #2d5a3f 10%, #3d6b4f 20%, #8a6d3b 35%, #CA8A04 50%);
  }

  /* Topo texture — left side only */
  .og::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("public/topo-7.png");
    background-repeat: repeat;
    background-size: 500px 500px;
    mix-blend-mode: multiply;
    opacity: 0.5;
    z-index: 1;
    pointer-events: none;
    clip-path: inset(0 50% 0 0);
  }

  /* Top bar */
  .og .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 72px;
    background: #292524;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    z-index: 10;
  }

  .top-bar .wordmark {
    font-family: 'Fraunces', serif;
    font-size: 40px;
    font-weight: 600;
    color: #FAFAF7;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Two-column layout below bar */
  .og .columns {
    position: absolute;
    top: 72px;
    left: 0;
    width: 100%;
    height: 558px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    z-index: 5;
  }

  /* Text column */
  .text-col {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 48px;
    gap: 16px;
  }

  .text-col .title {
    font-family: 'Fraunces', serif;
    font-size: 96px;
    font-weight: 700;
    color: #FAFAF7;
    line-height: 0.9;
    text-transform: uppercase;
    letter-spacing: -0.01em;
  }
  .text-col .title.long { font-size: 80px; }
  .text-col .title.very-long { font-size: 64px; }

  .text-col .divider {
    width: 48px;
    height: 2px;
    background: rgba(255,255,255,0.3);
  }

  .text-col .name {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 36px;
    color: #CA8A04;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  .text-col .author {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 28px;
    color: rgba(250, 250, 247, 0.6);
  }

  /* Image column */
  .img-col {
    position: relative;
    overflow: hidden;
  }

  .img-col img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    /* EDIT per profile — zoom in by scaling up: */
    object-position: center 35%;
    transform: scale(2);
    transform-origin: center 40%;
  }
</style>
</head>
<body>
  <!--
    OG IMAGE WORKFLOW:
    1. Edit the fields below (title, name, image src, object-position)
    2. Open this file in browser
    3. Screenshot the .og card at 1200x630
    4. Save to: public/images/social/{slug}-og.png
    5. The site auto-detects and uses it as the OG image
    6. Satori fallback handles profiles without a manual screenshot
  -->
  <p class="instructions">
    Edit fields for each profile. Screenshot the .og div at 1200x630.
  </p>

  <!-- ═══ EDIT THESE FOR EACH PROFILE ═══ -->
  <div class="og" id="og-card">

    <div class="top-bar">
      <span class="wordmark">Southern Legends</span>
      <span class="wordmark" style="font-family: 'Source Sans 3', sans-serif; font-size: 28px; font-weight: 400; opacity: 0.7;">By Matt Headley</span>
    </div>

    <div class="columns">
      <div class="text-col">
        <h1 class="title">A New<br>Way of<br>Growing</h1>
        <div class="divider"></div>
        <p class="name">Aquality Farms</p>
      </div>

      <div class="img-col">
        <img src="public/images/profiles/aquality-farms/sawyer-brothers-grow-room.webp" alt="">
      </div>
    </div>

  </div>
</body>
</html>
